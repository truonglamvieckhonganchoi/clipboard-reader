name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build ClipReader APK

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.4
          ./gradlew assembleDebug

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk clipreader-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: clipreader-apk
          path: clipreader-debug.apk
          retention-days: 30
